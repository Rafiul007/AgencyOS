packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  core-js: false
  esbuild: true
  msgpackr-extract: true
  prisma: true

# Allow post-install build scripts only for these trusted native/codegen packages.
onlyBuiltDependencies:
  - "@nestjs/core"
  - "@prisma/client"
  - "@prisma/engines"
  - "prisma"
  - "esbuild"
  - "msgpackr-extract"

# Explicitly ignore this dependency's build script (just a funding notice) so
# `pnpm install` doesn't error asking for approval.
ignoredBuiltDependencies:
  - "core-js"
